name: Deploy Banking System to AWS

on:
  push:
    branches:
      - main
      - master

env:
  DOCKERHUB_USERNAME: pasindu12345
  AWS_REGION: us-east-1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: auth-service
            context: ./Backend/auth-service
          - name: account-service
            context: ./Backend/account-service
          - name: transaction-service
            context: ./Backend/transaction-service
          - name: audit-service
            context: ./Backend/audit-service
          - name: notification-service
            context: ./Backend/notification-service
          - name: api-gateway
            context: ./api-gateway
          - name: frontend
            context: ./Frontend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "gradle"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: SonarQube Scan
        if: matrix.service.name != 'frontend' # Only for Java/Gradle services
        continue-on-error: true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          cd ${{ matrix.service.context }}
          ./gradlew classes sonar --info

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:${{ github.sha }}

  provision-and-deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init & Apply
        id: terraform
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

      - name: Get Server IP
        id: get-ip
        run: |
          cd terraform
          echo "SERVER_IP=$(terraform output -raw server_public_ip)" >> $GITHUB_OUTPUT

      - name: Wait for K3s to be ready
        run: sleep 60

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.get-ip.outputs.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create K8s directory on server
            mkdir -p ~/k8s/infrastructure ~/k8s/services

            # Note: In a real scenario, we would transfer the files first. 
            # For this pipeline, we'll scp them in the next step or use a simpler approach.

      - name: Transfer K8s Manifests
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          AUTH_DB_PASS: ${{ secrets.AUTH_DB_PASS }}
          ACCOUNT_DB_PASS: ${{ secrets.ACCOUNT_DB_PASS }}
          TRANSACTION_DB_PASS: ${{ secrets.TRANSACTION_DB_PASS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MONGODB_ADMIN_USER: ${{ secrets.MONGODB_ADMIN_USER }}
          MONGODB_ADMIN_PASS: ${{ secrets.MONGODB_ADMIN_PASS }}
          MAILTRAP_API_TOKEN: ${{ secrets.MAILTRAP_API_TOKEN }}
          MAILTRAP_FROM_EMAIL: ${{ secrets.MAILTRAP_FROM_EMAIL }}
        run: |
          # Use SCP to transfer manifests
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

          # Inject secrets into manifests template
          envsubst < k8s/secrets.yaml > k8s/secrets.yaml.tmp && mv k8s/secrets.yaml.tmp k8s/secrets.yaml
          envsubst < k8s/configmap.yaml > k8s/configmap.yaml.tmp && mv k8s/configmap.yaml.tmp k8s/configmap.yaml

          # Update image tags in manifests locally before transferring
          find k8s/services -type f -name "*.yaml" -exec sed -i "s|:latest|:${{ github.sha }}|g" {} +

          scp -i private_key.pem -o StrictHostKeyChecking=no -r k8s ubuntu@${{ steps.get-ip.outputs.SERVER_IP }}:~/

      - name: Apply Kubernetes Manifests
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.get-ip.outputs.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Apply all manifests
            sudo kubectl apply -f ~/k8s/configmap.yaml
            sudo kubectl apply -f ~/k8s/secrets.yaml
            sudo kubectl apply -f ~/k8s/infrastructure/
            sudo kubectl apply -f ~/k8s/services/

            # Verify status
            sudo kubectl get pods -A
