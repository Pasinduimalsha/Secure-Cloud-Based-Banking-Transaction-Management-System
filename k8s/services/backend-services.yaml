# --- Account Service ---
apiVersion: v1
kind: Service
metadata:
  name: account-service
spec:
  ports:
    - port: 8082
  selector:
    app: account-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
spec:
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: pasindu12345/account-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: SPRING_PROFILES_ACTIVE
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: banking-config
                  key: SPRING_DATASOURCE_URL_ACCOUNT
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: ACCOUNT_DB_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: ACCOUNT_DB_PASS
            - name: TOKEN_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: JWT_SECRET
---
