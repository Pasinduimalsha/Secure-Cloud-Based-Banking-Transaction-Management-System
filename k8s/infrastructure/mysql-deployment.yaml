apiVersion: v1
kind: Service
metadata:
  name: mysql-db
spec:
  ports:
    - port: 3306
  selector:
    app: mysql-db
  clusterIP: None # Headless service for direct access
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-db
spec:
  selector:
    matchLabels:
      app: mysql-db
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql-db
    spec:
      containers:
        - image: mysql:8.0
          name: mysql
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: AUTH_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: AUTH_DB_PASS
            - name: ACCOUNT_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: ACCOUNT_DB_PASS
            - name: TRANSACTION_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: banking-secrets
                  key: TRANSACTION_DB_PASS
          ports:
            - containerPort: 3306
              name: mysql
          volumeMounts:
            - name: mysql-persistent-storage
              mountPath: /var/lib/mysql
            - name: init-db
              mountPath: /docker-entrypoint-initdb.d
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost"]
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: mysql-persistent-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: init-db
          configMap:
            name: mysql-init-script
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
data:
  init-db.sh: |
    #!/bin/bash
    DATABASES=("authService" "accountService" "transactionService")
    for DB in "${DATABASES[@]}"
    do
        mysql -u root -p"$MYSQL_ROOT_PASSWORD" -e "CREATE DATABASE IF NOT EXISTS $DB;"
        USER_NAME="${DB}_user"
        
        # Select the correct password based on the database name
        if [ "$DB" == "authService" ]; then PASSWORD="$AUTH_DB_PASS";
        elif [ "$DB" == "accountService" ]; then PASSWORD="$ACCOUNT_DB_PASS";
        elif [ "$DB" == "transactionService" ]; then PASSWORD="$TRANSACTION_DB_PASS";
        fi
        
        mysql -u root -p"$MYSQL_ROOT_PASSWORD" -e "CREATE USER IF NOT EXISTS '$USER_NAME'@'%' IDENTIFIED BY '$PASSWORD';"
        mysql -u root -p"$MYSQL_ROOT_PASSWORD" -e "GRANT ALL PRIVILEGES ON $DB.* TO '$USER_NAME'@'%';"
    done
    mysql -u root -p"$MYSQL_ROOT_PASSWORD" -e "FLUSH PRIVILEGES;"
