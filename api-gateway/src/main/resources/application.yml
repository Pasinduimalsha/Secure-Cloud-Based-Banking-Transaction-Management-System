spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: account-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/accounts/**
        - id: transaction-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/transactions/**
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
        - id: audit-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/audit/**

server:
  port: 8000

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
