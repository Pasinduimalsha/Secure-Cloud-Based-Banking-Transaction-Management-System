spring.application.name=transaction-service
server.port=${SERVER_PORT:8083}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/transactionService?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:transactionService_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:transactionService_pass12}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Redis Configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# RabbitMQ Configuration
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Service URLs
account.service.url=${ACCOUNT_SERVICE_URL:http://localhost:8082}

# JWT Configuration
token.signing.key=${TOKEN_SIGNING_KEY:413F4428472B4B6250655368566D5970337336763979244226452948404D6351}

# Logging
logging.level.root=INFO
