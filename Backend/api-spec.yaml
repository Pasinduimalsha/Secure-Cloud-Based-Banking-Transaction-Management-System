openapi: 3.0.3
info:
  title: Banking Transaction Management System API
  description: API documentation for the Secure Cloud-Based Banking Transaction Management System.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api/v1
    description: API Gateway

paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: User Login
      responses:
        200:
          description: OK
  
  /auth/register:
    post:
      tags:
        - Auth
      summary: User Registration
      responses:
        201:
          description: Created

  /accounts:
    get:
      tags:
        - Account
      summary: List all accounts
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountDTO'
    post:
      tags:
        - Account
      summary: Create a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountDTO'
      responses:
        201:
          description: Created

  /accounts/{accountId}:
    get:
      tags:
        - Account
      summary: Get account details
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDTO'

  /accounts/{accountId}/balance:
    get:
      tags:
        - Account
      summary: Get account balance
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: number
                    format: decimal

  /accounts/{accountId}/status:
    put:
      tags:
        - Account
      summary: Update account status
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [ACTIVE, FROZEN, CLOSED]
      responses:
        200:
          description: Status updated successfully

  /transactions:
    get:
      tags:
        - Transaction
      summary: List all transactions
      responses:
        200:
          description: OK
    post:
      tags:
        - Transaction
      summary: Create a new transaction
      responses:
        201:
          description: Created

  /audit/logs:
    get:
      tags:
        - Audit
      summary: Retrieve audit logs
      responses:
        200:
          description: OK

  /notifications:
    get:
      tags:
        - Notification
      summary: List notifications
      responses:
        200:
          description: OK

components:
  schemas:
    AccountDTO:
      type: object
      properties:
        id:
          type: integer
        accountNumber:
          type: string
        userId:
          type: string
          description: "Formatted user identifier (e.g., BNK-USR-1001)"
        balance:
          type: number
          format: decimal
        type:
          type: string
          enum: [SAVINGS, CURRENT]
        status:
          type: string
          enum: [ACTIVE, FROZEN, CLOSED]
        createdAt:
          type: string
          format: date-time
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
