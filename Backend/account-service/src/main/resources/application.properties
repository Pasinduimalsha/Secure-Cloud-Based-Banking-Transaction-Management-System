spring.application.name=account-service
server.port=${SERVER_PORT:8082}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/accountService?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:accountService_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:accountService_pass12}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT Configuration
token.signing.key=${TOKEN_SIGNING_KEY:413F4428472B4B6250655368566D5970337336763979244226452948404D6351}

# Logging
logging.level.root=INFO
